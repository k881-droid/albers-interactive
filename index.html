<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homage to the Square</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="reset.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hero">
    <h1 class="hero-title">Homage to the Square</h1>
    <p class="hero-sub">After Josef Albers — two studies in motion</p>
  </header>

  <section class="section" id="piece1">
    <div class="squares-wrap" id="expand-comp">
      <div class="sq"></div>
      <div class="sq"></div>
      <div class="sq"></div>
      <div class="sq"></div>
    </div>
  </section>

  <section class="section" id="piece2">
    <div class="float-row">

      <div class="comp comp-b" data-float>
        <div class="layer layer-1"></div>
        <div class="layer layer-2"></div>
        <div class="layer layer-3"></div>
        <div class="layer layer-4"></div>
      </div>

      <div class="comp comp-c" data-float>
        <div class="layer layer-1"></div>
        <div class="layer layer-2"></div>
        <div class="layer layer-3"></div>
        <div class="layer layer-4"></div>
      </div>

      <div class="comp comp-d" data-float>
        <div class="layer layer-1"></div>
        <div class="layer layer-2"></div>
        <div class="layer layer-3"></div>
        <div class="layer layer-4"></div>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
